<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockVision - Acesse sua Conta</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/auth.css">
</head>
<body>

    <header class="auth-header">
        <button id="theme-toggle" class="theme-btn" aria-label="Alternar tema">🌓</button>
    </header>

    <main class="auth-container">
        <div class="auth-card">
            <div class="brand-area">
                <h2>StockVision</h2>
                <p class="slogan">Veja o futuro. Controle o resultado.</p>
            </div>
            
            <h3 class="auth-title">Acesse sua conta</h3>
            <p class="auth-subtitle">Insira seu e-mail e senha para continuar</p>

            <form id="login-form">
                <div class="input-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>

                <div class="input-group">
                    <div class="label-wrapper">
                        <label for="password">Senha *</label>
                        <a href="#" class="forgot-password">Esqueceu a senha?</a>
                    </div>
                    <input type="password" id="password" required>
                </div>

                <button type="submit" class="btn">Entrar</button>
            </form>

            <p class="auth-footer">
                Não tem uma conta? <a href="register.html">Cadastre-se</a>
            </p>
        </div>
    </main>

    <script src="../assets/js/theme.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/main.js"></script>
</body>
</html>
